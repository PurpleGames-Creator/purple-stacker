<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>🟣 Purple Stacker 🟣</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0b0617;
      color: #f4f0ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    .app {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 0%, #2a1856 0%, #140a2e 55%, #0b0617 100%);
    }
    .canvas-wrap {
      position: relative;
      width: 100vw; height: 100vh;
      max-width: 100vw; max-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    canvas {
      display: block;
      width: auto; height: 100%;
      max-width: 100vw;
      aspect-ratio: 360 / 640;
      background: #1a1033;
      box-shadow: 0 0 60px rgba(124, 58, 237, 0.35);
      touch-action: none;
    }
    /* ---- Overlays ---- */
    .overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      z-index: 5;
    }
    .card {
      width: min(92vw, 360px);
      max-height: 92vh;
      overflow-y: auto;
      background: linear-gradient(160deg, rgba(46, 26, 92, 0.96), rgba(24, 13, 51, 0.97));
      border: 1px solid rgba(168, 130, 255, 0.35);
      border-radius: 20px;
      padding: 22px 18px 18px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      -webkit-overflow-scrolling: touch;
    }
    .title {
      font-size: 30px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(90deg, #c4a0ff, #f0e6ff, #a855f7);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 2px;
      text-shadow: 0 0 24px rgba(168,130,255,0.4);
    }
    .subtitle { font-size: 12px; color: #b9a7e8; margin-bottom: 16px; letter-spacing: 0.5px; }
    .label { font-size: 12px; color: #cbb9f5; margin: 14px 0 6px; }
    .nick-input {
      width: 100%; padding: 11px 12px; font-size: 15px;
      border-radius: 12px; border: 1px solid rgba(168,130,255,0.4);
      background: rgba(13, 7, 30, 0.8); color: #fff; text-align: center;
      outline: none;
    }
    .nick-input:focus { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,130,255,0.25); }
    .primary-btn {
      width: 100%; margin-top: 14px; padding: 14px;
      font-size: 17px; font-weight: 700; color: #fff;
      border: none; border-radius: 14px; cursor: pointer;
      background: linear-gradient(135deg, #9333ea, #6d28d9);
      box-shadow: 0 8px 20px rgba(124,58,237,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.08s ease, filter 0.15s ease;
    }
    .primary-btn:active { transform: scale(0.97); filter: brightness(1.1); }
    .how {
      margin-top: 14px; font-size: 11.5px; line-height: 1.7; color: #c8b9ef;
      background: rgba(13,7,30,0.45); border-radius: 12px; padding: 10px 12px; text-align: left;
    }
    .how b { color: #f0c674; }
    /* ranking */
    .rank-box { margin-top: 16px; }
    .rank-head {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 14px; font-weight: 700; color: #e7dcff; margin-bottom: 8px;
    }
    .rank-arrow { cursor: pointer; padding: 2px 10px; font-size: 18px; color: #a855f7; user-select: none; }
    .rank-arrow:active { color: #fff; }
    .rank-title { width: 150px; }
    .rank-list { list-style: none; padding: 0; margin: 0; max-height: 210px; overflow-y: auto; text-align: left; }
    .rank-list li {
      display: flex; justify-content: space-between; gap: 8px;
      padding: 4px 8px; font-size: 13px; border-radius: 8px; color: #e9e0ff;
    }
    .rank-list li:nth-child(odd) { background: rgba(168,130,255,0.07); }
    .rank-list li.me { background: rgba(240,198,116,0.18); color: #ffe9b8; font-weight: 700; }
    .rank-list .rk { color: #b9a7e8; min-width: 34px; }
    .rank-list .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-list .sc { color: #f0c674; font-weight: 700; }
    .rank-list .r1 .sc, .rank-list .r1 .nm { color: #ffd76b; }
    .muted { color: #9b8bc4; font-size: 12px; padding: 10px; }
    /* result */
    .result-score { font-size: 15px; margin: 6px 0; color: #e3d8ff; }
    .result-score b { font-size: 34px; color: #f0c674; vertical-align: -4px; }
    .new-record { display: none; margin: 8px auto; font-weight: 800; color: #ffd76b; font-size: 16px;
      animation: pop 0.6s ease infinite alternate; }
    @keyframes pop { from { transform: scale(1); } to { transform: scale(1.08); } }
    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-row button { flex: 1; padding: 12px; font-size: 15px; font-weight: 700; border-radius: 12px; border: none; cursor: pointer; }
    .btn-retry { color: #fff; background: linear-gradient(135deg, #9333ea, #6d28d9); }
    .btn-sub { color: #d9caff; background: rgba(168,130,255,0.18); border: 1px solid rgba(168,130,255,0.35) !important; }
    .btn-row button:active { transform: scale(0.97); }
    .share-btn {
      width: 100%; margin-top: 10px; padding: 11px; font-size: 14px; font-weight: 700;
      color: #0b0617; background: linear-gradient(135deg, #f0c674, #ffb703);
      border: none; border-radius: 12px; cursor: pointer;
    }
    .share-btn:active { transform: scale(0.97); }
    .hidden { display: none !important; }
    .toast {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(13,7,30,0.92); color: #fff; padding: 10px 18px; border-radius: 20px;
      font-size: 13px; z-index: 20; opacity: 0; transition: opacity 0.3s; pointer-events: none;
      border: 1px solid rgba(168,130,255,0.4);
    }
    .toast.show { opacity: 1; }
    .mute-btn {
      position: absolute; top: 10px; right: 10px; z-index: 8;
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid rgba(168,130,255,0.4);
      background: rgba(13,7,30,0.55); color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(2px);
    }
    .mute-btn:active { transform: scale(0.92); }
  </style>
</head>
<body>
  <div class="app">
    <div class="canvas-wrap">
      <canvas id="game" width="360" height="640"></canvas>

      <!-- START -->
      <div id="start-screen" class="overlay">
        <div class="card">
          <div class="title">🟣 Purple Stacker 🟣</div>
          <div class="subtitle">パプ太郎とレンガを積み上げろ</div>

          <div class="label">ニックネームを入力してください</div>
          <input id="nickname-input" class="nick-input" type="text" maxlength="12" placeholder="例: むらさき太郎" />
          <button id="btn-start" class="primary-btn">ゲームスタート</button>

          <div class="how">
            ⚖️ <b>高ければ高いほど</b>バランスはシビアに…！<br>
            ↔️ 傾いたら<b>逆側</b>に置いて立て直そう！<br>
            🏆 何<b>段</b>積めるか世界中のプレイヤーと競おう
          </div>

          <div class="rank-box">
            <div class="rank-head">
              <span id="rank-prev" class="rank-arrow">◀</span>
              <span id="rank-title" class="rank-title">今日のランキング</span>
              <span id="rank-next" class="rank-arrow">▶</span>
            </div>
            <ol id="rank-list" class="rank-list"><li class="muted">読み込み中…</li></ol>
          </div>
        </div>
      </div>

      <!-- GAME OVER -->
      <div id="over-screen" class="overlay hidden">
        <div class="card">
          <div class="title" style="font-size:24px;">💥 TIMBER! 💥</div>
          <div class="subtitle" id="over-nick"></div>
          <div class="new-record" id="new-record">✨ 自己ベスト更新！ ✨</div>
          <div class="result-score">今回の記録　<b id="res-current">0</b> 段</div>
          <div class="result-score">自己ベスト　<span id="res-best">0</span> 段</div>
          <button id="btn-share" class="share-btn">📣 記録をシェア</button>
          <div class="btn-row">
            <button id="btn-retry" class="btn-retry">もう一回</button>
            <button id="btn-top" class="btn-sub">トップへ</button>
          </div>
          <div class="rank-box">
            <div class="rank-head">
              <span id="rank-prev2" class="rank-arrow">◀</span>
              <span id="rank-title2" class="rank-title">今日のランキング</span>
              <span id="rank-next2" class="rank-arrow">▶</span>
            </div>
            <ol id="rank-list2" class="rank-list"></ol>
          </div>
        </div>
      </div>

      <button id="btn-mute" class="mute-btn" aria-label="サウンド切替">🔊</button>
      <div id="toast" class="toast"></div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    /* ===================== Supabase ===================== */
    const SUPABASE_URL = "https://hefayilffszrczxhnpii.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZmF5aWxmZnN6cmN6eGhucGlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDI5NDEsImV4cCI6MjA4NzUxODk0MX0.qUsuQOIZzdlFLXtR-i1d9TX5c3P9QKPdhv34QGt4V_k";
    const RANKING_TABLE = "stacker_scores";
    let supa = null;
    function getSupa() {
      if (!supa && window.supabase) {
        try { supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch (e) { supa = null; }
      }
      return supa;
    }

    /* ===================== Canvas ===================== */
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;   // 360
    const H = canvas.height;  // 640
    const CX = W / 2;

    // パプ太郎の画像
    const papImg = new Image();
    let papReady = false;
    papImg.onload = function () { papReady = true; };
    papImg.src = "paptaro.png";
    const PAP_W = 62, PAP_H = Math.round(62 * 572 / 502); // 画像比率を保持

    /* ===================== Config ===================== */
    const BRICK_W = 92;
    const BRICK_H = 26;
    const FOUND_W = 120;          // 土台の幅
    const FOUND_H = 40;
    const FOUND_TOP = H - 70;     // 土台上面のスクリーンY(カメラ無し)
    const BAL_LIMIT = 120;        // バランス値(傾き)がこれを超えると倒壊
    const BAL_REF = 45;           // 「今どれだけ傾いているか」の基準。小さいほど不安定が増幅しやすい
    const BAL_HSENS = 0.05;       // 高さ係数。傾いている時ほど&高い時ほど新たなズレが増幅する
    const SLIDE_LIMIT = BRICK_W * 0.72; // 直下からこれ以上ズレると即落下
    const PERFECT_EPS = 3;        // パーフェクト判定(px) ※スナップ＆コンボ
    const GOOD_EPS = 18;          // これ以内のズレは「Good!」、超えるとノーリアクション
    const PAP_Y = 70;             // パプ太郎のスクリーンY(固定)
    const TARGET_TOP_SCREEN = H * 0.46; // 積み上げ面を保つ画面位置
    const DROP_GRAV = 0.9;
    // 揺れ(バネ＋減衰の振り子モデル)
    const SWAY_OMEGA0 = 0.20;     // 基本の角振動数(高いほど速い)。塔が高いとゆっくりになる
    const SWAY_DAMP0 = 0.13;      // 基本の減衰(大きいほど早く収まる)
    const SWAY_TILTMAX = 0.05;    // 重い側へ傾く平衡角の最大
    const SWAY_KICK = 0.05;       // 着地時に与える揺れの強さ

    /* ===================== State ===================== */
    let state = "start"; // start | playing | over
    let bricks = [];     // {cx, level, w, perfect}
    let falling = null;  // {cx, y, vy}  y = no-camera top
    let pap = { x: CX, dir: 1, speed: 2.0 };
    let comOffset = 0;   // バランス値(符号付き)。高いほど傾き大。±BAL_LIMITで倒壊
    let renderLean = 0;  // 見た目の傾き角(バネ＋減衰で物理的に揺れる)
    let leanVel = 0;     // 傾きの角速度
    let combo = 0;
    let score = 0;
    let bestScore = 0;
    let particles = [];
    let popups = [];
    let debris = [];     // 倒壊アニメ用
    let shake = 0;
    let cameraShift = 0;
    let wind = 0;        // 風(高所)
    let windTarget = 0;
    let flash = 0;
    let playerName = "";
    let previousBest = 0;
    let bgPhase = 0;     // 0昼 1夕 2夜 3宇宙
    let cameraTarget = 0;
    let papDrop = 0;     // パプ太郎が落とすモーション(0..1)
    let lastAccuracy = 0; // 直近の着地ズレ(px)
    let papHop = 0;      // パーフェクト時の喜びジャンプ(0..1)
    let emote = { sym: "", life: 0 };  // パプ太郎の吹き出し絵文字
    let banner = { text: "", life: 0 }; // マイルストーン等の中央バナー
    let papFall = null;  // 倒壊時にパプ太郎が落ちる {x,y,vy,ang,va}
    let topScore = 0;    // ランキング1位の段数(ゴーストライン用)
    let collapseZoom = 1;   // 倒壊時のズームアウト
    let collapseTopY = 0;   // 倒壊時の到達高さ(画面Y)
    let collapseScore = 0;  // 倒壊時の段数(マーカー表示用)
    let flyers = [];     // 背景の鳥/飛行機/流れ星
    let flyerTimer = 90;

    /* ===================== Helpers ===================== */
    function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
    function rand(a, b) { return a + Math.random() * (b - a); }
    function vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

    /* ===================== Sound (WebAudio・自己完結) ===================== */
    let actx = null, masterGain = null, muted = false;
    function audio() {
      if (!actx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        actx = new AC();
        masterGain = actx.createGain();
        masterGain.gain.value = muted ? 0 : 0.9;
        masterGain.connect(actx.destination);
      }
      if (actx.state === "suspended") { try { actx.resume(); } catch (e) {} }
      return actx;
    }
    function setMuted(m) {
      muted = m;
      if (masterGain) masterGain.gain.value = m ? 0 : 0.9;
      if (m) stopWobble();
    }
    // 単音(エンベロープ付き)
    function tone(freq, dur, type, vol, glideTo, delay) {
      const ac = audio(); if (!ac) return;
      const t0 = ac.currentTime + (delay || 0);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type || "sine";
      o.frequency.setValueAtTime(freq, t0);
      if (glideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, glideTo), t0 + dur);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol, t0 + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(masterGain);
      o.start(t0); o.stop(t0 + dur + 0.02);
    }
    // ノイズ(衝撃・崩壊用)
    function noise(dur, vol, filtType, f0, f1) {
      const ac = audio(); if (!ac) return;
      const t0 = ac.currentTime;
      const len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const src = ac.createBufferSource(); src.buffer = buf;
      const filt = ac.createBiquadFilter(); filt.type = filtType || "lowpass";
      filt.frequency.setValueAtTime(f0 || 800, t0);
      if (f1) filt.frequency.exponentialRampToValueAtTime(Math.max(40, f1), t0 + dur);
      const g = ac.createGain();
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      src.connect(filt); filt.connect(g); g.connect(masterGain);
      src.start(t0); src.stop(t0 + dur + 0.02);
    }
    function sfxTap()  { tone(560, 0.06, "triangle", 0.18, 360); }
    function sfxLand() { tone(150, 0.13, "sine", 0.32, 90); noise(0.09, 0.18, "lowpass", 500, 120); }
    function sfxGood() { tone(523, 0.10, "triangle", 0.22); }
    function sfxGreat(){ tone(659, 0.10, "triangle", 0.26); tone(880, 0.10, "triangle", 0.16, null, 0.06); }
    function sfxPerfect(combo) {
      const base = 1 + Math.min(combo, 10) * 0.045; // コンボで音程上昇
      const notes = [659, 880, 1175];
      notes.forEach((n, i) => tone(n * base, 0.12, "triangle", 0.26 - i * 0.04, null, i * 0.05));
      tone(330 * base, 0.18, "sine", 0.12);
    }
    function sfxCollapse() {
      noise(0.6, 0.5, "lowpass", 1200, 120);
      tone(220, 0.5, "sawtooth", 0.3, 60);
      tone(140, 0.6, "square", 0.22, 50, 0.05);
    }
    function sfxFanfare() {
      const ns = [523, 659, 784, 1047]; // ドミソド↑
      ns.forEach((n, i) => tone(n, 0.18, "triangle", 0.24, null, i * 0.08));
    }

    function setEmote(sym) { emote.sym = sym; emote.life = 1.2; }
    // グラグラ音(危険時に鳴り続ける)
    let wobOsc = null, wobLfo = null, wobGain = null, wobLfoGain = null;
    function ensureWobble() {
      const ac = audio(); if (!ac || wobOsc) return;
      wobOsc = ac.createOscillator(); wobOsc.type = "sawtooth"; wobOsc.frequency.value = 70;
      wobGain = ac.createGain(); wobGain.gain.value = 0;
      wobLfo = ac.createOscillator(); wobLfo.type = "sine"; wobLfo.frequency.value = 7;
      wobLfoGain = ac.createGain(); wobLfoGain.gain.value = 0.5;
      wobLfo.connect(wobLfoGain); wobLfoGain.connect(wobGain.gain);
      wobOsc.connect(wobGain); wobGain.connect(masterGain);
      wobOsc.start(); wobLfo.start();
    }
    function setWobble(intensity) { // 0..1
      if (intensity > 0.01) ensureWobble();
      if (!wobGain || !actx) return;
      const target = Math.min(0.18, intensity * 0.18);
      wobGain.gain.setTargetAtTime(target, actx.currentTime, 0.05);
      if (wobLfo) wobLfo.frequency.setTargetAtTime(5 + intensity * 8, actx.currentTime, 0.1);
    }
    function stopWobble() { if (wobGain && actx) wobGain.gain.setTargetAtTime(0, actx.currentTime, 0.05); }

    function topSurfaceNoCam() { return FOUND_TOP - bricks.length * BRICK_H; }

    // 着地時のズレをバランス値に加算。
    // ・傾きを悪化させる向き … 「今の不安定さ × 高さ」で増幅(高く積むほど&傾くほどシビア)
    // ・傾きを戻す向き(立て直し) … 等倍で確実に効く。行き過ぎてゼロを越えた分だけ
    //   反対側の新たな傾きとして等倍計上(増幅しない=過補正で逆に倒れない)
    function applyBalance(offset, level) {
      const worsening = comOffset === 0 || Math.sign(offset) === Math.sign(comOffset);
      if (worsening) {
        const instab = Math.abs(comOffset) / BAL_REF;
        const sens = 1 + instab * (1 + level * BAL_HSENS);
        comOffset += offset * sens;
      } else {
        // 立て直し方向: 等倍で確実に効く。ゼロを越えた超過分も等倍のまま=過補正で逆に倒れない
        comOffset += offset;
      }
    }

    function updateCamera() {
      cameraTarget = Math.max(0, TARGET_TOP_SCREEN - topSurfaceNoCam());
    }

    /* ===================== Game control ===================== */
    function resetGame() {
      bricks = [];
      falling = null;
      pap = { x: CX, dir: Math.random() < 0.5 ? -1 : 1, speed: 2.0 };
      comOffset = 0; renderLean = 0; leanVel = 0;
      combo = 0; score = 0;
      particles = []; popups = []; debris = [];
      shake = 0; wind = 0; windTarget = 0; flash = 0;
      bgPhase = 0;
      papHop = 0; papDrop = 0; emote = { sym: "", life: 0 }; banner = { text: "", life: 0 };
      papFall = null; collapseZoom = 1; flyers = []; flyerTimer = 90;
      state = "playing";
      updateCamera();
      cameraShift = cameraTarget;
    }

    function dropBrick() {
      if (state !== "playing" || falling) return;
      // パプ太郎の足元から落とす
      falling = { cx: pap.x, y: (PAP_Y + 26) - cameraShift, vy: 0.6 };
      papDrop = 1; // 落とすモーション開始
      sfxTap();
    }

    function placeBrick() {
      const belowCx = bricks.length > 0 ? bricks[bricks.length - 1].cx : CX;
      const offset = falling.cx - belowCx;

      // 直下から外れすぎ → 乗らずに滑り落ちてゲームオーバー
      if (Math.abs(offset) > SLIDE_LIMIT) {
        const sy = topSurfaceNoCam() - BRICK_H + cameraShift;
        const sgn = offset >= 0 ? 1 : -1;
        debris.push({ x: falling.cx, y: sy, w: BRICK_W, h: BRICK_H, vx: sgn * rand(2, 4), vy: rand(-2, 1), va: sgn * 0.12, ang: 0, perfect: false });
        falling = null;
        collapse("slide");
        return;
      }

      const absOff = Math.abs(offset);
      lastAccuracy = absOff;
      // 着地精度: ピッタリ=PERFECT / 少しズレ=Good! / それ以上=ノーリアクション
      const isPerfect = absOff <= PERFECT_EPS;
      const isGood = !isPerfect && absOff <= GOOD_EPS;
      const dirLabel = (offset >= 0 ? "右" : "左") + Math.round(absOff); // 例: 右2 / 左6

      let cx = falling.cx;
      if (isPerfect) cx = belowCx; // パーフェクトのみ吸着

      addBrickToStack(cx, isPerfect);
      falling = null;
      score = bricks.length; // スコア = 段数

      // 着地エフェクト(新レンガ底面の接地点)
      const surfY = topSurfaceNoCam() + BRICK_H + cameraShift;
      spawnDust(cx, surfY, isPerfect);
      sfxLand();

      if (isPerfect) {
        combo++;
        flash = 0.5;
        vibrate(30);
        sfxPerfect(combo);
        papHop = 1; // 喜びジャンプ
        setEmote(combo >= 5 ? "🔥" : "😆");
        popups.push({ x: cx, y: surfY - 30, life: 1, text: combo >= 2 ? "PERFECT x" + combo : "PERFECT!", color: "#ffe9b8" });
      } else if (isGood) {
        combo = 0;
        vibrate(12);
        sfxGood();
        popups.push({ x: cx, y: surfY - 30, life: 1, text: "Good! " + dirLabel, color: "#bdf0ff" });
      } else {
        combo = 0; // ノーリアクション(段数と揺れだけ)
      }

      // バランスへ加算(パーフェクトは0=タワーを安定させる)。高い段ほど大きく効く
      applyBalance(isPerfect ? 0 : offset, bricks.length - 1);

      // 着地の衝撃で揺れを励起(ズレが大きい&不安定なほど大きくゆれる。精密なら揺れない)
      const impactDanger = Math.abs(comOffset) / BAL_LIMIT;
      leanVel += (offset / BRICK_W) * SWAY_KICK * (0.5 + impactDanger);

      // バランス限界オーバー → 倒壊
      if (Math.abs(comOffset) > BAL_LIMIT) {
        collapse("lean");
        return;
      }

      // マイルストーン(10段ごと)演出
      if (score > 0 && score % 10 === 0) {
        banner = { text: score + "段 達成！", life: 1.4 };
        setEmote("🎉");
        sfxFanfare();
        flash = Math.max(flash, 0.4);
      }

      // 難易度: パプ太郎が速くなる
      pap.speed = clamp(2.0 + bricks.length * 0.055, 2.0, 5.2);
      // 背景フェーズ
      bgPhase = bricks.length < 12 ? 0 : bricks.length < 25 ? 1 : bricks.length < 45 ? 2 : 3;
      // 風(20段以降)
      if (bricks.length >= 20 && Math.random() < 0.04) windTarget = rand(-1, 1);

      updateCamera();
    }

    function addBrickToStack(cx, perfect) {
      bricks.push({ cx: cx, level: bricks.length, w: BRICK_W, perfect: perfect });
    }

    function collapse(reason) {
      if (state !== "playing") return;
      state = "over";
      shake = 22;
      flash = 0.7;
      vibrate([40, 30, 90]);
      stopWobble();
      sfxCollapse();
      const dir = comOffset >= 0 ? 1 : -1;
      // ドラマチック演出: ズームアウト＋到達高度マーカー＋カメラを土台へ
      collapseZoom = 1;
      collapseScore = score;
      collapseTopY = topSurfaceNoCam() + cameraShift; // 崩壊時の頂上の画面Y
      // パプ太郎も一緒に落ちる
      papFall = { x: pap.x, y: PAP_Y, vy: -3, ang: 0, va: dir * 0.12 };
      // 全レンガを物理デブリ化。重い側へ「倒れる」ように、
      // 上のレンガほど大きく横へ振れて落ちる(縁を支点に転倒)。
      for (let i = 0; i < bricks.length; i++) {
        const b = bricks[i];
        const h = b.level + 1; // 上ほど大きい
        const by = FOUND_TOP - h * BRICK_H + cameraShift;
        debris.push({
          x: b.cx, y: by, w: BRICK_W, h: BRICK_H,
          vx: dir * (0.6 + h * 0.22) + rand(-0.4, 0.4),
          vy: rand(-1.2, 0.4),
          va: dir * (0.03 + h * 0.006), ang: 0,
          perfect: b.perfect
        });
      }
      bricks = [];
      setTimeout(finishGame, 1700);
    }

    async function finishGame() {
      // ベスト判定
      const isNew = score > previousBest;
      if (score > bestScore) bestScore = score;
      saveLocalBest();
      // 画面
      document.getElementById("over-nick").textContent = "プレイヤー: " + (playerName || "ななしさん");
      document.getElementById("res-current").textContent = score;
      document.getElementById("res-best").textContent = bestScore;
      document.getElementById("new-record").style.display = isNew && score > 0 ? "block" : "none";
      showOver();
      // 送信
      const client = getSupa();
      if (client && score > 0) {
        try {
          await client.from(RANKING_TABLE).insert({ nickname: (playerName || "").trim() || "ななしさん", score: score });
        } catch (e) {}
      }
      loadRanking();
    }

    /* ===================== Particles / popups ===================== */
    function spawnDust(x, y, big) {
      const n = big ? 22 : 10;
      for (let i = 0; i < n; i++) {
        const a = rand(0, Math.PI * 2);
        const sp = rand(1, big ? 5 : 3);
        particles.push({
          x: x + rand(-BRICK_W / 2, BRICK_W / 2), y: y,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
          life: 1, size: rand(2, big ? 6 : 4),
          color: big ? (Math.random() < 0.5 ? "#ffe9b8" : "#f0c674") : "#b9a7e8"
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.15 * dt;
        p.life -= 0.02 * dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = popups.length - 1; i >= 0; i--) {
        const p = popups[i];
        p.y -= 0.6 * dt; p.life -= 0.012 * dt;
        if (p.life <= 0) popups.splice(i, 1);
      }
    }

    /* ===================== Drawing ===================== */
    const SKY = [
      ["#8ec5ff", "#cfe8ff"], // 昼
      ["#ff9e6d", "#ffd29e"], // 夕
      ["#1b2a6b", "#3a2a6b"], // 夜
      ["#06030f", "#150a2e"]  // 宇宙
    ];
    let stars = [];
    for (let i = 0; i < 60; i++) stars.push({ x: Math.random() * W, y: Math.random() * H * 0.7, r: Math.random() * 1.6 + 0.4, tw: Math.random() * Math.PI * 2 });

    function drawBackground(t) {
      const c = SKY[bgPhase];
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, c[0]); g.addColorStop(1, c[1]);
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

      // パララックス: 登るほど(cameraShift)景色がゆっくり下へ流れる
      const par = (cameraShift * 0.18) % (H + 200);

      // 太陽 / 月
      if (bgPhase <= 1) {
        const sy = 70 + par * 0.5;
        ctx.fillStyle = bgPhase === 0 ? "rgba(255,240,170,0.9)" : "rgba(255,180,120,0.95)";
        ctx.beginPath(); ctx.arc(W - 64, sy, 26, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = bgPhase === 0 ? "rgba(255,240,170,0.25)" : "rgba(255,180,120,0.3)";
        ctx.beginPath(); ctx.arc(W - 64, sy, 38, 0, Math.PI * 2); ctx.fill();
      } else {
        const my = 66 + par * 0.5;
        ctx.fillStyle = "rgba(235,235,255,0.92)";
        ctx.beginPath(); ctx.arc(72, my, 22, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = SKY[bgPhase][0];
        ctx.beginPath(); ctx.arc(80, my - 6, 19, 0, Math.PI * 2); ctx.fill(); // 三日月の影
      }

      if (bgPhase >= 2) {
        for (const s of stars) {
          const sy = (s.y + par * 0.7) % (H * 0.9);
          const a = 0.4 + 0.6 * Math.abs(Math.sin(t * 0.002 + s.tw));
          ctx.globalAlpha = a; ctx.fillStyle = "#fff";
          ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      // 雲(昼/夕)。時間で横流れ＋登りで下へ(パララックス)
      if (bgPhase <= 1) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        drawCloud(60 + (t * 0.01 % (W + 80)) - 40, (90 + par * 0.8) % (H + 120) - 60, 1);
        drawCloud(240 + (t * 0.006 % (W + 80)) - 40, (180 + par * 1.1) % (H + 120) - 60, 0.8);
        drawCloud(150 + (t * 0.008 % (W + 80)) - 40, (320 + par * 1.4) % (H + 120) - 60, 0.6);
      }
    }
    function drawCloud(x, y, s) {
      ctx.beginPath();
      ctx.arc(x, y, 18 * s, 0, Math.PI * 2);
      ctx.arc(x + 20 * s, y + 4 * s, 14 * s, 0, Math.PI * 2);
      ctx.arc(x - 18 * s, y + 6 * s, 12 * s, 0, Math.PI * 2);
      ctx.fill();
    }

    function brickFace(x, yTop, w, h, perfect) {
      // 立体的なレンガ(紫系グラデ＋目地＋ハイライト)
      const r = 5;
      const g = ctx.createLinearGradient(0, yTop, 0, yTop + h);
      if (perfect) { g.addColorStop(0, "#f7d98a"); g.addColorStop(0.5, "#e9b94f"); g.addColorStop(1, "#b9852e"); }
      else { g.addColorStop(0, "#a472e8"); g.addColorStop(0.5, "#7c44d4"); g.addColorStop(1, "#5a2ca3"); }
      ctx.fillStyle = g;
      roundRect(x - w / 2, yTop, w, h, r); ctx.fill();
      // 上面ハイライト
      ctx.fillStyle = "rgba(255,255,255,0.28)";
      roundRect(x - w / 2 + 3, yTop + 2, w - 6, 4, 2); ctx.fill();
      // 下影
      ctx.fillStyle = "rgba(0,0,0,0.22)";
      roundRect(x - w / 2 + 3, yTop + h - 5, w - 6, 3, 2); ctx.fill();
      // 縦の目地(レンガ風)
      ctx.strokeStyle = "rgba(0,0,0,0.16)"; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, yTop + 4); ctx.lineTo(x, yTop + h - 4);
      ctx.moveTo(x - w / 4, yTop + 4); ctx.lineTo(x - w / 4, yTop + h - 4);
      ctx.moveTo(x + w / 4, yTop + 4); ctx.lineTo(x + w / 4, yTop + h - 4);
      ctx.stroke();
      // 枠
      ctx.strokeStyle = perfect ? "rgba(255,240,200,0.6)" : "rgba(200,170,255,0.35)";
      ctx.lineWidth = 1;
      roundRect(x - w / 2, yTop, w, h, r); ctx.stroke();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawFoundation() {
      const y = FOUND_TOP + cameraShift;
      // 地面
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(0, y + FOUND_H - 2, W, H);
      const g = ctx.createLinearGradient(0, y, 0, y + FOUND_H);
      g.addColorStop(0, "#5b4636"); g.addColorStop(1, "#3a2c22");
      ctx.fillStyle = g;
      roundRect(CX - FOUND_W / 2, y, FOUND_W, FOUND_H, 6); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      roundRect(CX - FOUND_W / 2 + 4, y + 3, FOUND_W - 8, 4, 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.18)"; ctx.lineWidth = 1;
      roundRect(CX - FOUND_W / 2, y, FOUND_W, FOUND_H, 6); ctx.stroke();
    }

    function drawTower() {
      if (bricks.length === 0) return;
      const pivotX = CX;
      const pivotY = FOUND_TOP + cameraShift;
      // 一番下のレンガが土台にめり込まないよう、傾けた分だけ持ち上げる
      // (実際の物体が縁を支点に傾くのと同じ＝沈み込まない)
      const halfW = BRICK_W / 2;
      const b0 = bricks[0].cx - CX;
      const s = Math.sin(renderLean);
      const dip = Math.max(0, (b0 - halfW) * s, (b0 + halfW) * s);
      ctx.save();
      ctx.translate(pivotX, pivotY - dip);
      ctx.rotate(renderLean);
      for (let i = 0; i < bricks.length; i++) {
        const b = bricks[i];
        const relX = b.cx - CX;
        const relTop = -(b.level + 1) * BRICK_H;
        brickFace(relX, relTop, BRICK_W, BRICK_H, b.perfect);
      }
      ctx.restore();
    }

    function drawFalling() {
      if (!falling) return;
      const y = falling.y + cameraShift;
      brickFace(falling.cx, y, BRICK_W, BRICK_H, false);
    }

    function drawPaptaro(t) {
      // 危険時の小刻みな震え＋パーフェクト時の喜びジャンプ
      const danger = Math.abs(comOffset) / BAL_LIMIT;
      const tremble = danger > 0.55 ? rand(-1, 1) * (danger - 0.55) * 6 : 0;
      const hop = Math.sin(papHop * Math.PI) * 10;
      const x = pap.x + tremble;
      const y = PAP_Y - hop;
      const bob = Math.sin(t * 0.008) * 2;

      ctx.save();
      ctx.translate(x, y + bob);
      ctx.scale(1 + papDrop * 0.06, 1 - papDrop * 0.1); // 落とす時の踏ん張り
      // 影
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath(); ctx.ellipse(0, PAP_H / 2 + 4, 22, 5, 0, 0, Math.PI * 2); ctx.fill();
      // 運んでいるレンガ(落下中でなければ)。落とす瞬間は下へ離れる
      if (!falling && state === "playing") {
        brickFace(0, PAP_H / 2 - 4 + papDrop * 12, 44, 14, false);
      }
      // パプ太郎本体(画像)。未ロード時は紫の丸で代替
      if (papReady) {
        ctx.drawImage(papImg, -PAP_W / 2, -PAP_H / 2, PAP_W, PAP_H);
      } else {
        const g = ctx.createRadialGradient(-5, -5, 4, 0, 0, 24);
        g.addColorStop(0, "#c79bff"); g.addColorStop(1, "#7c3aed");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();

      // 吹き出し絵文字(喜ぶ/慌てる/お祝い)
      if (emote.life > 0 && emote.sym) {
        const ey = y - PAP_H / 2 - 14;
        ctx.globalAlpha = Math.min(1, emote.life * 2);
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.beginPath(); ctx.arc(x + 18, ey, 13, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x + 8, ey + 8); ctx.lineTo(x + 6, ey + 16); ctx.lineTo(x + 14, ey + 9); ctx.closePath(); ctx.fill();
        ctx.font = "16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(emote.sym, x + 18, ey + 6);
        ctx.textAlign = "start"; ctx.globalAlpha = 1;
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      for (const p of popups) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.font = "bold 18px sans-serif"; ctx.textAlign = "center";
        ctx.fillStyle = p.color; ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 3;
        ctx.strokeText(p.text, p.x, p.y); ctx.fillText(p.text, p.x, p.y);
      }
      ctx.globalAlpha = 1; ctx.textAlign = "start";
    }

    function drawDebris() {
      for (const d of debris) {
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.ang);
        brickFace(0, -d.h / 2, d.w, d.h, d.perfect);
        ctx.restore();
      }
    }

    function drawHUD() {
      // 段数
      ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center";
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.strokeStyle = "rgba(80,40,140,0.6)"; ctx.lineWidth = 4;
      ctx.strokeText(score + " 段", CX, 44);
      ctx.fillText(score + " 段", CX, 44);
      // コンボ
      if (combo >= 2 && combo < 5) {
        ctx.font = "bold 16px sans-serif"; ctx.fillStyle = "#ffe9b8";
        ctx.fillText("COMBO " + combo, CX, 66);
      }
      // あと◯段 煽り(自己ベスト/1位が目前)
      let goal = 0, glabel = "";
      if (bestScore > score && bestScore - score <= 3) { goal = bestScore; glabel = "🏅自己ベスト"; }
      else if (topScore > score && topScore - score <= 3) { goal = topScore; glabel = "👑1位"; }
      if (goal > 0 && combo < 5) {
        ctx.font = "bold 15px sans-serif"; ctx.fillStyle = "#ffd76b";
        ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.lineWidth = 3;
        const txt = glabel + "まであと " + (goal - score) + "段！";
        ctx.strokeText(txt, CX, 86); ctx.fillText(txt, CX, 86);
      }
      ctx.textAlign = "start";
      drawBalanceMeter();
    }

    function drawBalanceMeter() {
      const mx = 20, my = H - 26, mw = W - 40, mh = 10;
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      roundRect(mx, my, mw, mh, 5); ctx.fill();
      // 安全ゾーン
      const safeRatio = 0.55;
      ctx.fillStyle = "rgba(120,220,140,0.25)";
      roundRect(mx + mw * (0.5 - safeRatio / 2), my, mw * safeRatio, mh, 5); ctx.fill();
      // マーカー
      const ratio = clamp(comOffset / BAL_LIMIT, -1, 1);
      const px = mx + mw / 2 + ratio * (mw / 2 - 6);
      const danger = Math.abs(comOffset) / BAL_LIMIT;
      ctx.fillStyle = danger > 0.8 ? "#ff5d5d" : danger > 0.55 ? "#ffd76b" : "#a0e8b0";
      ctx.beginPath(); ctx.arc(px, my + mh / 2, 8, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1.5; ctx.stroke();
      // 中心線
      ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(mx + mw / 2, my - 2); ctx.lineTo(mx + mw / 2, my + mh + 2); ctx.stroke();
      // ラベル
      ctx.font = "10px sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.textAlign = "center";
      ctx.fillText("⚖ バランス", CX, my - 6);
      ctx.textAlign = "start";
    }

    /* ===================== Flyers / Parallax ===================== */
    function spawnFlyer() {
      const fromLeft = Math.random() < 0.5;
      const sx = fromLeft ? -40 : W + 40;
      const dir = fromLeft ? 1 : -1;
      if (bgPhase <= 1) {
        if (Math.random() < 0.4) {
          flyers.push({ kind: "plane", x: sx, y: 50 + Math.random() * 110, vx: dir * (1.2 + Math.random()), vy: 0, dir: dir, t: 0 });
        } else {
          flyers.push({ kind: "bird", x: sx, y: 70 + Math.random() * 220, vx: dir * (1.4 + Math.random() * 1.4), vy: 0, dir: dir, t: 0 });
        }
      } else {
        flyers.push({ kind: "star", x: Math.random() * W, y: -20, vx: (Math.random() < 0.5 ? -1 : 1) * (3 + Math.random() * 2), vy: 4 + Math.random() * 3, dir: 1, t: 0 });
      }
    }
    function updateFlyers(dt) {
      flyerTimer -= dt;
      if (flyerTimer <= 0 && (state === "playing" || state === "start")) {
        spawnFlyer();
        flyerTimer = 150 + Math.random() * 220;
      }
      for (let i = flyers.length - 1; i >= 0; i--) {
        const f = flyers[i];
        f.x += f.vx * dt; f.y += f.vy * dt; f.t += dt;
        if (f.x < -90 || f.x > W + 90 || f.y > H + 90) flyers.splice(i, 1);
      }
    }
    function drawFlyers(t) {
      for (const f of flyers) {
        if (f.kind === "bird") {
          const flap = Math.abs(Math.sin(f.t * 0.25)) * 5;
          ctx.strokeStyle = "rgba(50,50,70,0.5)"; ctx.lineWidth = 2; ctx.lineCap = "round";
          for (let k = -1; k <= 1; k++) {
            const bx = f.x + k * 13, by = f.y + Math.abs(k) * 5;
            ctx.beginPath();
            ctx.moveTo(bx - 6, by);
            ctx.quadraticCurveTo(bx - 3, by - 5 - flap, bx, by);
            ctx.quadraticCurveTo(bx + 3, by - 5 - flap, bx + 6, by);
            ctx.stroke();
          }
        } else if (f.kind === "plane") {
          ctx.save(); ctx.translate(f.x, f.y); ctx.scale(f.dir, 1);
          ctx.fillStyle = "rgba(70,72,90,0.5)";
          ctx.beginPath(); ctx.ellipse(0, 0, 12, 3, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-7, -7); ctx.lineTo(3, 0); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-13, -5); ctx.lineTo(-7, 0); ctx.closePath(); ctx.fill();
          ctx.restore();
          ctx.strokeStyle = "rgba(255,255,255,0.22)"; ctx.lineWidth = 2; ctx.setLineDash([2, 5]);
          ctx.beginPath(); ctx.moveTo(f.x - f.dir * 12, f.y); ctx.lineTo(f.x - f.dir * 55, f.y); ctx.stroke(); ctx.setLineDash([]);
        } else if (f.kind === "star") {
          ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.lineWidth = 2; ctx.lineCap = "round";
          ctx.beginPath(); ctx.moveTo(f.x, f.y); ctx.lineTo(f.x - f.vx * 4, f.y - f.vy * 4); ctx.stroke();
          ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(f.x, f.y, 1.8, 0, Math.PI * 2); ctx.fill();
        }
      }
    }

    /* ===================== Ghost lines / Banner / Fever / 倒壊演出 ===================== */
    function floorScreenY(floors) { return FOUND_TOP - floors * BRICK_H + cameraShift; }
    function drawGhostLine(floors, label, color) {
      if (floors <= 0 || floors <= score) return;
      const y = floorScreenY(floors);
      if (y < 12 || y > H - 44) return;
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([9, 7]);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); ctx.setLineDash([]);
      ctx.font = "bold 12px sans-serif"; ctx.textAlign = "right";
      ctx.fillStyle = color; ctx.fillText(label, W - 8, y - 4);
      ctx.textAlign = "start";
    }
    function drawGhostLines() {
      drawGhostLine(bestScore, "🏅 自己ベスト " + bestScore + "段", "rgba(255,215,107,0.9)");
      if (topScore !== bestScore) drawGhostLine(topScore, "👑 1位 " + topScore + "段", "rgba(125,222,255,0.9)");
    }
    function drawBanner() {
      if (banner.life <= 0) return;
      const a = Math.min(1, banner.life * 1.5);
      const scale = 1 + (1 - Math.min(1, banner.life * 2)) * 0.0; // 出現時の余韻
      ctx.save();
      ctx.globalAlpha = a; ctx.textAlign = "center";
      ctx.font = "bold 30px sans-serif";
      ctx.fillStyle = "#fff"; ctx.strokeStyle = "rgba(124,58,237,0.85)"; ctx.lineWidth = 6;
      ctx.strokeText(banner.text, CX, H * 0.34);
      ctx.fillStyle = "#ffe9b8"; ctx.fillText(banner.text, CX, H * 0.34);
      ctx.restore(); ctx.textAlign = "start"; ctx.globalAlpha = 1;
    }
    function drawFeverOverlay() {
      if (combo < 5) return;
      // 画面ふちに暖色グロー＋FEVER表示
      const pulse = 0.12 + 0.06 * Math.sin(performance.now() * 0.02);
      const g = ctx.createRadialGradient(CX, H / 2, H * 0.3, CX, H / 2, H * 0.62);
      g.addColorStop(0, "rgba(255,140,40,0)");
      g.addColorStop(1, "rgba(255,120,30," + pulse + ")");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
      ctx.fillStyle = "#ffd76b"; ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 3;
      ctx.strokeText("🔥 FEVER x" + combo, CX, 92); ctx.fillText("🔥 FEVER x" + combo, CX, 92);
      ctx.textAlign = "start";
    }
    function drawPapFall() {
      const x = papFall.x, y = papFall.y;
      ctx.save(); ctx.translate(x, y); ctx.rotate(papFall.ang);
      if (papReady) ctx.drawImage(papImg, -PAP_W / 2, -PAP_H / 2, PAP_W, PAP_H);
      ctx.restore();
    }
    function drawHeightMarker() {
      const y = collapseTopY;
      if (y < 10 || y > H) return;
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 2; ctx.setLineDash([6, 5]);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); ctx.setLineDash([]);
      ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
      ctx.fillStyle = "#fff"; ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 3;
      ctx.strokeText("🏁 到達 " + collapseScore + "段", CX, y - 8);
      ctx.fillText("🏁 到達 " + collapseScore + "段", CX, y - 8);
      ctx.textAlign = "start";
    }

    function drawWindFx(t) {
      if (Math.abs(wind) < 0.05 || bgPhase < 1) return;
      ctx.strokeStyle = "rgba(255,255,255,0.18)"; ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        const y = 120 + i * 70 + Math.sin(t * 0.01 + i) * 8;
        const len = 30 * Math.abs(wind);
        const sx = wind > 0 ? 20 : W - 20;
        ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + Math.sign(wind) * len, y); ctx.stroke();
      }
    }

    /* ===================== Update ===================== */
    function update(dt, t) {
      // カメラ・風の補間
      cameraShift += (cameraTarget - cameraShift) * 0.15 * dt;
      wind += (windTarget - wind) * 0.02 * dt;
      windTarget *= Math.pow(0.995, dt);
      if (papDrop > 0) papDrop = Math.max(0, papDrop - 0.08 * dt);
      if (papHop > 0) papHop = Math.max(0, papHop - 0.06 * dt);
      if (emote.life > 0) emote.life -= 0.012 * dt;
      if (banner.life > 0) banner.life -= 0.011 * dt;
      updateFlyers(dt, t);

      if (state === "playing") {
        // パプ太郎の往復移動
        const margin = 28;
        pap.x += pap.dir * pap.speed * dt + wind * 0.3 * dt;
        if (pap.x < margin) { pap.x = margin; pap.dir = 1; }
        if (pap.x > W - margin) { pap.x = W - margin; pap.dir = -1; }

        // 落下中レンガ
        if (falling) {
          falling.vy += DROP_GRAV * dt;
          falling.y += falling.vy * dt;
          const landY = topSurfaceNoCam() - BRICK_H; // 新レンガ上面がここに来たら接地
          if (falling.y >= landY) { falling.y = landY; placeBrick(); }
        }

        // 揺れは「バネ＋減衰の振り子」で物理的に表現(自然なゆらゆら)。
        // 高いほどゆっくり揺れ、不安定なほど減衰が弱く長く揺れる。
        const ratio = clamp(comOffset / BAL_LIMIT, -1, 1);
        const danger = Math.abs(ratio);
        const target = ratio * SWAY_TILTMAX;                       // 重い側へ傾く平衡角
        const omega = SWAY_OMEGA0 / (1 + bricks.length * 0.03);    // 高い塔ほどゆっくり
        const damp = SWAY_DAMP0 * (1 - danger * 0.75);             // 不安定ほど長く揺れる
        const accel = -(omega * omega) * (renderLean - target) - damp * leanVel;
        leanVel += accel * dt;
        leanVel += wind * 0.00018 * dt;                            // 風でゆらす
        renderLean += leanVel * dt;
        renderLean = clamp(renderLean, -0.4, 0.4);

        // 危険域に入ったら慌てる絵文字
        if (danger > 0.72 && emote.life <= 0) setEmote("😨");
      } else if (state === "over") {
        // デブリ物理
        for (const d of debris) {
          d.vy += 0.5 * dt; d.x += d.vx * dt; d.y += d.vy * dt; d.ang += d.va * dt;
          if (d.y > H + 60) d.y = H + 60;
        }
        renderLean += (0 - renderLean) * 0.1 * dt;
        // パプ太郎の落下
        if (papFall) {
          papFall.vy += 0.5 * dt; papFall.x += (comOffset >= 0 ? 1 : -1) * 1.5 * dt;
          papFall.y += papFall.vy * dt; papFall.ang += papFall.va * dt;
        }
        // ズームアウトして全体を見せる＋カメラを土台へ
        collapseZoom += (0.78 - collapseZoom) * 0.06 * dt;
        cameraTarget = 0;
      }

      if (state !== "playing") stopWobble();

      updateParticles(dt);
      if (shake > 0) shake = Math.max(0, shake - 0.8 * dt);
      if (flash > 0) flash = Math.max(0, flash - 0.04 * dt);
    }

    /* ===================== Render ===================== */
    function render(t) {
      // 背景・空・フライヤーは常に全画面(ズーム/シェイクの影響を受けない)→ 残像防止
      drawBackground(t);
      drawFlyers(t);

      // ゲーム要素のみズーム＆シェイクを適用
      ctx.save();
      if (state === "over" && collapseZoom < 0.999) {
        ctx.translate(CX, H * 0.48); ctx.scale(collapseZoom, collapseZoom); ctx.translate(-CX, -H * 0.48);
      }
      if (shake > 0) ctx.translate(rand(-shake, shake) * 0.5, rand(-shake, shake) * 0.5);
      drawWindFx(t);
      if (state === "playing") drawGhostLines();
      drawFoundation();
      drawTower();
      drawDebris();
      if (papFall) drawPapFall();
      drawFalling();
      drawParticles();
      if (state === "playing") { drawPaptaro(t); drawHUD(); drawFeverOverlay(); }
      if (state === "over") drawHeightMarker();
      drawBanner();
      ctx.restore();
      if (flash > 0) {
        ctx.fillStyle = "rgba(255,255,255," + (flash * 0.5) + ")";
        ctx.fillRect(0, 0, W, H);
      }
    }

    /* ===================== Loop ===================== */
    let last = performance.now();
    function loop(now) {
      const ms = Math.min(50, now - last); last = now;
      const dt = ms / (1000 / 60) || 1;
      update(dt, now);
      render(now);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    /* ===================== Input ===================== */
    function onTap(e) {
      if (state !== "playing") return;
      // カード上のUI操作は無視
      if (e.target && e.target.closest && e.target.closest(".card")) return;
      e.preventDefault();
      dropBrick();
    }
    canvas.addEventListener("mousedown", onTap);
    canvas.addEventListener("touchstart", onTap, { passive: false });
    window.addEventListener("keydown", function (e) {
      if (e.code === "Space" || e.code === "ArrowDown") { e.preventDefault(); dropBrick(); }
    });

    /* ===================== Local best ===================== */
    function localKey() { return "purple_stacker_best_" + ((playerName || "").trim() || "_"); }
    function saveLocalBest() { try { localStorage.setItem(localKey(), String(bestScore)); } catch (e) {} }
    function loadLocalBest() { try { const v = parseInt(localStorage.getItem(localKey()) || "0", 10); bestScore = isNaN(v) ? 0 : v; } catch (e) { bestScore = 0; } }

    /* ===================== Ranking ===================== */
    const rankModes = [
      { id: "daily", name: "今日のランキング" },
      { id: "monthly", name: "月間ランキング" },
      { id: "all", name: "歴代ランキング" }
    ];
    let rankIdx = 0;

    function rankLabel() {
      const m = rankModes[rankIdx];
      if (m.id === "monthly") return (new Date().getMonth() + 1) + "月の月間ランキング";
      return m.name;
    }
    function rankDateFrom() {
      const m = rankModes[rankIdx]; const now = new Date();
      if (m.id === "daily") return new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
      if (m.id === "monthly") return new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
      return null;
    }

    async function loadRanking() {
      const titles = [document.getElementById("rank-title"), document.getElementById("rank-title2")];
      const lists = [document.getElementById("rank-list"), document.getElementById("rank-list2")];
      titles.forEach(function (el) { if (el) el.textContent = rankLabel(); });
      const client = getSupa();
      if (!client) { renderRankRows(lists, [{ muted: "ランキングを読み込めません" }]); return; }
      try {
        const from = rankDateFrom();
        let q = client.from(RANKING_TABLE).select("nickname, score, created_at").order("score", { ascending: false }).limit(3000);
        if (from) q = q.gte("created_at", from);
        const { data, error } = await q;
        if (error) { renderRankRows(lists, [{ muted: "取得できませんでした" }]); return; }
        const byName = {};
        (data || []).forEach(function (row) {
          const n = (row.nickname || "").trim() || "ななし";
          if (!(n in byName) || byName[n] < row.score) byName[n] = Number(row.score);
        });
        const uniq = Object.keys(byName).map(function (k) { return { nickname: k, score: byName[k] }; });
        uniq.sort(function (a, b) { return b.score - a.score; });
        const top = uniq.slice(0, 100);
        topScore = top.length ? top[0].score : 0; // ゴーストライン用(1位の段数)
        // 自己ベスト表示(現プレイヤー)
        const me = (playerName || "").trim();
        if (me && byName[me] != null && byName[me] > bestScore) { bestScore = byName[me]; saveLocalBest(); }
        if (top.length === 0) { renderRankRows(lists, [{ muted: "まだ記録がありません" }]); return; }
        let prev = null, dispRank = 0;
        const rows = top.map(function (r, i) {
          if (r.score !== prev) dispRank = i + 1;
          prev = r.score;
          return { rank: dispRank, nickname: r.nickname, score: r.score, me: me && r.nickname === me };
        });
        renderRankRows(lists, rows);
      } catch (e) {
        renderRankRows(lists, [{ muted: "読み込みに失敗しました" }]);
      }
    }

    function renderRankRows(lists, rows) {
      lists.forEach(function (ol) {
        if (!ol) return;
        ol.innerHTML = "";
        rows.forEach(function (r) {
          const li = document.createElement("li");
          if (r.muted) { li.className = "muted"; li.textContent = r.muted; ol.appendChild(li); return; }
          if (r.me) li.classList.add("me");
          if (r.rank === 1) li.classList.add("r1");
          const medal = r.rank === 1 ? "🥇" : r.rank === 2 ? "🥈" : r.rank === 3 ? "🥉" : (r.rank + "位");
          li.innerHTML = '<span class="rk">' + medal + '</span><span class="nm">' + escapeHtml(r.nickname) + '</span><span class="sc">' + r.score + ' 段</span>';
          ol.appendChild(li);
        });
      });
    }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]; }); }

    /* ===================== Screens ===================== */
    const startScreen = document.getElementById("start-screen");
    const overScreen = document.getElementById("over-screen");
    function showStart() { startScreen.classList.remove("hidden"); overScreen.classList.add("hidden"); loadRanking(); }
    function showOver() { overScreen.classList.remove("hidden"); }
    function hideAll() { startScreen.classList.add("hidden"); overScreen.classList.add("hidden"); }

    function startGame() {
      audio(); // ユーザー操作で音声を有効化
      const input = document.getElementById("nickname-input");
      playerName = (input.value || "").trim();
      try { localStorage.setItem("purple_stacker_nick", playerName); } catch (e) {}
      loadLocalBest();
      previousBest = bestScore;
      hideAll();
      resetGame();
    }

    /* ===================== Wire up ===================== */
    document.getElementById("btn-start").addEventListener("click", startGame);
    document.getElementById("nickname-input").addEventListener("keydown", function (e) { if (e.key === "Enter") startGame(); });
    document.getElementById("btn-retry").addEventListener("click", function () {
      previousBest = bestScore; hideAll(); resetGame();
    });
    document.getElementById("btn-top").addEventListener("click", function () { state = "start"; stopWobble(); showStart(); });

    // ミュート切替
    try { muted = localStorage.getItem("purple_stacker_muted") === "1"; } catch (e) {}
    const muteBtn = document.getElementById("btn-mute");
    function refreshMuteBtn() { muteBtn.textContent = muted ? "🔇" : "🔊"; }
    refreshMuteBtn();
    muteBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      setMuted(!muted);
      try { localStorage.setItem("purple_stacker_muted", muted ? "1" : "0"); } catch (e2) {}
      refreshMuteBtn();
      if (!muted) { audio(); sfxTap(); }
    });

    document.getElementById("btn-share").addEventListener("click", async function () {
      const text = "🟣Purple Stackerで " + score + "段 積み上げた！パプ太郎とレンガ積みに挑戦🧱 #PurpleStacker";
      const url = location.href;
      try {
        if (navigator.share) { await navigator.share({ title: "Purple Stacker", text: text, url: url }); }
        else { await navigator.clipboard.writeText(text + " " + url); toast("記録をコピーしました！"); }
      } catch (e) {}
    });

    function bindRankArrows(prevId, nextId) {
      const p = document.getElementById(prevId), n = document.getElementById(nextId);
      if (p) p.addEventListener("click", function () { rankIdx = (rankIdx - 1 + rankModes.length) % rankModes.length; loadRanking(); });
      if (n) n.addEventListener("click", function () { rankIdx = (rankIdx + 1) % rankModes.length; loadRanking(); });
    }
    bindRankArrows("rank-prev", "rank-next");
    bindRankArrows("rank-prev2", "rank-next2");

    let toastTimer = null;
    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg; el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { el.classList.remove("show"); }, 1800);
    }

    // ピンチズーム抑止
    document.addEventListener("touchmove", function (e) {
      if (e.touches && e.touches.length >= 2) e.preventDefault();
    }, { passive: false });

    /* ===================== Init ===================== */
    try {
      const saved = localStorage.getItem("purple_stacker_nick");
      if (saved) document.getElementById("nickname-input").value = saved;
    } catch (e) {}

    // 検証用フック(?debug 指定時のみ)
    if (location.search.indexOf("debug") >= 0) {
      window.__stacker = {
        start: startGame, drop: dropBrick,
        center: function () { pap.x = bricks.length ? bricks[bricks.length - 1].cx : CX; },
        nudge: function (dx) { pap.x = (bricks.length ? bricks[bricks.length - 1].cx : CX) + dx; },
        get state() { return state; },
        get score() { return score; },
        get bricks() { return bricks.length; },
        get falling() { return !!falling; },
        get com() { return comOffset; }
      };
    }

    showStart();
  })();
  </script>
</body>
